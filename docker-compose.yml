services:
  emulator:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ra-contract-emulator
    ports:
      - "8000:8000"
    volumes:
      - ./data/seeds:/app/data/seeds
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - ra-network

networks:
  ra-network:
    name: ra-network
